[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "python-testing"
version = "0.1.0"
description = "Sample Python project for the uv pipeline."
readme = "README.md"
requires-python = ">=3.12"

[dependency-groups]
dev = ["pytest>=8.4.0"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
