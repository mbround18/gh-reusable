name: Dagger Run
description: Warms the Dagger engine and executes a Dagger module function call.

inputs:
  call:
    description: "Dagger function call string (e.g. 'rust-build-and-test --source=.')"
    required: true
  module:
    description: "Dagger module reference"
    required: false
    default: "github.com/mbround18/gh-reusable/packages/dagger-module@main"
  cloud-token:
    description: "Dagger Cloud token for caching"
    required: false
    default: ""

outputs:
  stdout:
    description: "Standard output from the Dagger function call"
    value: ${{ steps.dagger.outputs.stdout }}

runs:
  using: composite
  steps:
    - name: Warm Dagger engine
      shell: bash
      run: |
        engine_image="registry.dagger.io/engine:v0.21.5"
        docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

    - name: Run Dagger call
      id: dagger
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
      env:
        DAGGER_NO_NAG: "1"
      with:
        version: v0.21.5
        module: ${{ inputs.module }}
        call: ${{ inputs.call }}
        cloud-token: ${{ inputs.cloud-token }}
