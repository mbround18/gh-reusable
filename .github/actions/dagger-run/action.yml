name: Dagger Run
description: Warms the Dagger engine and executes a Dagger module function call.

inputs:
  call:
    description: "Dagger function call string (e.g. 'rust-build-and-test --source=.')"
    required: true
  module:
    description: "Dagger module reference"
    required: false
    default: "github.com/mbround18/gh-reusable/packages/dagger-module@aff8423c31771a97c7080604cd9a2502edf42b8e"
  cloud-token:
    description: "Dagger Cloud token for caching"
    required: false
    default: ""
  dagger-version:
    description: "Dagger CLI version to execute"
    required: false
    default: "v0.21.5"
  engine-version:
    description: "Dagger engine image version to prewarm"
    required: false
    default: "v0.21.5"

outputs:
  stdout:
    description: "Standard output from the Dagger function call"
    value: ${{ steps.dagger.outputs.stdout }}
  report-markdown:
    description: "Human-readable markdown extracted from structured Dagger JSON output"
    value: ${{ steps.surface-report.outputs.report-markdown }}
  pipeline-success:
    description: "Boolean-like string when structured Dagger output reports success/failure"
    value: ${{ steps.surface-report.outputs.pipeline-success }}

runs:
  using: composite
  steps:
    - name: Validate Docker runtime
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v docker >/dev/null 2>&1; then
          echo "::error title=Missing Docker CLI::docker is required by dagger-run but was not found on PATH."
          exit 1
        fi
        if ! docker info >/dev/null 2>&1; then
          echo "::error title=Docker daemon unavailable::docker info failed; ensure the runner has a running Docker daemon."
          exit 1
        fi

    - name: Warm Dagger engine
      shell: bash
      run: |
        set -euo pipefail
        engine_image="registry.dagger.io/engine:${{ inputs.engine-version }}"
        if docker image inspect "$engine_image" >/dev/null 2>&1; then
          exit 0
        fi

        for attempt in 1 2 3; do
          if docker pull "$engine_image"; then
            exit 0
          fi
          if [ "$attempt" -lt 3 ]; then
            echo "Retrying engine pull ($attempt/3) ..."
            sleep $((attempt * 2))
          fi
        done

        echo "::error title=Failed to prewarm Dagger engine::Unable to pull $engine_image after 3 attempts."
        exit 1

    - name: Run Dagger call
      id: dagger
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1, https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1
      env:
        DAGGER_NO_NAG: "1"
        GH_REUSABLE_NESTED_DAGGER: "1"
        DAGGER_PNPM_PIPELINE: "1"
      with:
        version: ${{ inputs.dagger-version }}
        module: ${{ inputs.module }}
        call: ${{ inputs.call }}
        cloud-token: ${{ inputs.cloud-token }}

    - name: Surface structured Dagger output
      id: surface-report
      shell: bash
      env:
        DAGGER_STDOUT: ${{ steps.dagger.outputs.stdout }}
      run: |
        set -euo pipefail
        node <<'NODE'
        const fs = require("node:fs");

        const raw = process.env.DAGGER_STDOUT ?? "";
        const githubOutput = process.env.GITHUB_OUTPUT;

        const writeOutput = (name, value) => {
          if (!githubOutput) {
            return;
          }
          fs.appendFileSync(
            githubOutput,
            `${name}<<__GH_REUSABLE_EOF__\n${value}\n__GH_REUSABLE_EOF__\n`,
          );
        };

        writeOutput("report-markdown", "");
        writeOutput("pipeline-success", "");

        const trimmed = raw.trim();
        if (!trimmed) {
          process.exit(0);
        }

        const tryParse = (value) => {
          try {
            return JSON.parse(value);
          } catch {
            return undefined;
          }
        };

        let parsed = tryParse(trimmed);
        if (parsed === undefined) {
          const firstBrace = trimmed.indexOf("{");
          const lastBrace = trimmed.lastIndexOf("}");
          if (firstBrace >= 0 && lastBrace > firstBrace) {
            parsed = tryParse(trimmed.slice(firstBrace, lastBrace + 1));
          }
        }
        if (parsed === undefined) {
          if (/"success"\s*:\s*false/.test(trimmed)) {
            console.error(
              "::error title=Dagger pipeline reported failure::Raw Dagger stdout indicates success=false, but structured JSON could not be parsed.",
            );
            process.exit(1);
          }
          process.exit(0);
        }

        if (!parsed || typeof parsed !== "object") {
          process.exit(0);
        }

        const envelope = parsed;
        const report =
          envelope.report && typeof envelope.report === "object"
            ? envelope.report
            : envelope;

        const markdown =
          (typeof envelope.reportMarkdown === "string" &&
            envelope.reportMarkdown.trim()) ||
          (typeof envelope.markdown === "string" && envelope.markdown.trim()) ||
          (typeof report.markdown === "string" && report.markdown.trim()) ||
          "";

        const errors = Array.isArray(report.errors)
          ? report.errors
          : Array.isArray(envelope.errors)
            ? envelope.errors
            : [];
        const hasExplicitSuccess = typeof envelope.success === "boolean";
        const successValue = hasExplicitSuccess
          ? envelope.success
          : typeof report.success === "boolean"
            ? report.success
            : undefined;
        const failed = successValue === false || errors.length > 0;

        if (markdown) {
          console.log("Dagger pipeline report:");
          console.log(markdown);
          writeOutput("report-markdown", markdown);
        }

        if (typeof successValue === "boolean") {
          writeOutput("pipeline-success", successValue ? "true" : "false");
        }

        if (failed) {
          console.error(
            "::error title=Dagger pipeline reported failure::Structured Dagger output returned success=false or included report errors.",
          );
          process.exit(1);
        }
        NODE
