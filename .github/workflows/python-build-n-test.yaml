name: "Python Build and Test"

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        description: "Python version to use (e.g., 3.12, 3.13)."
        default: "3.12"
      runs-on:
        required: false
        type: string
        description: "GitHub runner to use for this workflow."
        default: "ubuntu-latest"
    secrets:
      DAGGER_CLOUD_TOKEN:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - id: dagger
        uses: mbround18/gh-reusable/.github/actions/dagger-run@main
        with:
          call: >-
            python-build-and-test
            --source=.
            --python-version=${{ inputs.python-version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - if: always()
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.dagger.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const raw = process.env.REPORT_JSON || '{}'
            let report = {}
            try {
              report = JSON.parse(raw)
            } catch (error) {
              core.warning(`Unable to parse Python pipeline report: ${error.message}`)
            }

            const payload = report.report || report
            const markdown = report.reportMarkdown || report.markdown || payload.markdown || '_No summary produced._'
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', markdown)
            if ((payload.errors || report.errors || []).length > 0) {
              core.setFailed('Pipeline report contains errors')
            }
            await core.summary.addRaw(markdown).write()
