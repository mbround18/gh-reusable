name: Audit Workflow

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "GitHub runner label."
      semgrep_config:
        required: false
        type: string
        default: "auto"
        description: "Semgrep ruleset config."
      include_gitleaks:
        required: false
        type: boolean
        default: true
        description: "Include secret scanning with gitleaks."
      create_alerts:
        required: false
        type: boolean
        default: false
        description: "Upload SARIF findings as GitHub code scanning alerts."
      track_release_summary:
        required: false
        type: boolean
        default: false
        description: "When true on tag refs, create/update release notes with audit summary."
    secrets:
      DAGGER_CLOUD_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit @ ${{ github.ref_name }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
        with:
          fetch-depth: 0

      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

      - name: Run Dagger audit module
        id: dagger_audit
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            audit
            --source=.
            --semgrep-config=${{ inputs.semgrep_config }}
            --include-gitleaks=${{ inputs.include_gitleaks }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Generate SARIF reports for alerts
        if: ${{ inputs.create_alerts }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .audit-reports

          docker run --rm \
            -v "$PWD:/src" \
            returntocorp/semgrep:1.81.0 \
            semgrep scan --config "${{ inputs.semgrep_config }}" --sarif --output /src/.audit-reports/semgrep.sarif /src || true

          if [[ "${{ inputs.include_gitleaks }}" == "true" ]]; then
            docker run --rm \
              -v "$PWD:/src" \
              zricethezav/gitleaks:v8.24.2 \
              detect --source=/src --report-format sarif --report-path /src/.audit-reports/gitleaks.sarif --redact --exit-code=0
          fi

      - name: Upload Semgrep SARIF
        if: ${{ inputs.create_alerts && hashFiles('.audit-reports/semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .audit-reports/semgrep.sarif
          category: audit-semgrep

      - name: Upload Gitleaks SARIF
        if: ${{ inputs.create_alerts && inputs.include_gitleaks && hashFiles('.audit-reports/gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .audit-reports/gitleaks.sarif
          category: audit-gitleaks

      - name: Build audit summary
        id: audit_summary
        if: ${{ always() && (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')) }}
        shell: bash
        env:
          DAGGER_STDOUT: ${{ steps.dagger_audit.outputs.stdout }}
          DAGGER_OUTCOME: ${{ steps.dagger_audit.outcome }}
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          markdown_file="$(mktemp)"
          {
            echo "## Audit status"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Outcome | \`${DAGGER_OUTCOME}\` |"
            echo "| Alerts enabled | \`${{ inputs.create_alerts }}\` |"
            echo "| Semgrep config | \`${{ inputs.semgrep_config }}\` |"
            echo "| Include gitleaks | \`${{ inputs.include_gitleaks }}\` |"
            echo "| Workflow run | [#${GITHUB_RUN_NUMBER}](${run_url}) |"
            echo ""
            echo "${DAGGER_STDOUT:-_No Dagger summary output produced._}"
          } > "$markdown_file"

          cat "$markdown_file" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "markdown<<EOF"
            cat "$markdown_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update sticky PR audit comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          SUMMARY_MARKDOWN: ${{ steps.audit_summary.outputs.markdown }}
        with:
          script: |
            const marker = '<!-- gh-reusable:audit:status -->'
            const body = `${marker}\n## Audit status\n\n${process.env.SUMMARY_MARKDOWN || '_No summary produced._'}`
            const issue_number = context.payload.pull_request.number
            const { owner, repo } = context.repo
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

      - name: Add PR audit history comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request.number
            const { owner, repo } = context.repo
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            const body = [
              '<!-- gh-reusable:audit:history -->',
              `Audit run [#${context.runNumber}](${runUrl}) completed.`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })

      - name: Update tag release notes with audit summary
        if: ${{ always() && startsWith(github.ref, 'refs/tags/') && inputs.track_release_summary }}
        uses: actions/github-script@v7
        env:
          SUMMARY_MARKDOWN: ${{ steps.audit_summary.outputs.markdown }}
        with:
          script: |
            const { owner, repo } = context.repo
            const tag = context.ref.replace('refs/tags/', '')
            const markerStart = '<!-- gh-reusable:audit:summary:start -->'
            const markerEnd = '<!-- gh-reusable:audit:summary:end -->'
            const summaryBlock = `${markerStart}\n## Audit summary\n\n${process.env.SUMMARY_MARKDOWN || '_No summary produced._'}\n${markerEnd}`

            let release
            try {
              const fetched = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              release = fetched.data
            } catch (error) {
              if (error.status !== 404) throw error
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body: summaryBlock,
              })
              release = created.data
            }

            const existingBody = release.body || ''
            const sectionPattern = new RegExp(`${markerStart}[\\s\\S]*${markerEnd}`)
            const newBody = sectionPattern.test(existingBody)
              ? existingBody.replace(sectionPattern, summaryBlock)
              : `${existingBody}\n\n${summaryBlock}`.trim()

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: newBody,
            })
