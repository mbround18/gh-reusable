name: Rust Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      source:
        description: "Path to the Rust crate source"
        required: false
        type: string
        default: "."
      registry:
        description: "Cargo registry (crates.io or a custom registry name)"
        required: false
        type: string
        default: "crates.io"
      version:
        description: "Version override (must match version in Cargo.toml)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      source:
        required: false
        type: string
        default: "."
        description: "Path to the Rust crate source directory."
      registry:
        required: false
        type: string
        default: "crates.io"
        description: "Cargo registry to publish to."
      version:
        required: false
        type: string
        default: ""
        description: "Version override (must match version in Cargo.toml)."
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "GitHub runner label."
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: true
        description: "Token with publish access to the target Cargo registry."
      DAGGER_CLOUD_TOKEN:
        required: false
      S3_ACCESS_KEY:
        required: false
      S3_SECRET_KEY:
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: hashFiles(format('{0}/Cargo.toml', inputs.source || '.')) != ''
    name: "Publish to ${{ inputs.registry || 'crates.io' }}"
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

      - name: Publish Rust crate
        id: publish
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          GITHUB_SHA: ${{ github.sha }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            publish-rust-crate
            --source=${{ inputs.source || '.' }}
            --token=${{ secrets.CARGO_REGISTRY_TOKEN }}
            --registry=${{ inputs.registry || 'crates.io' }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Materialize report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) {
              core.setFailed('Pipeline report contains errors')
            }
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()

      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rust-release-report
          path: |
            report.json
            report.md
