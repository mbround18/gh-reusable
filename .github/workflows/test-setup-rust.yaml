name: "Test | Setup Rust"

on:
  # Trigger when a pull request is opened or synchronized
  pull_request:
    branches:
      - main
    paths:
      - "actions/setup-rust/**"
      - ".github/workflows/test-setup-rust.yaml"

  # Trigger when code is pushed to the 'main' branch
  push:
    branches:
      - main
    paths:
      - "actions/setup-rust/**"
      - ".github/workflows/test-setup-rust.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-setup-rust:
    name: "Setup Rust (Dagger)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 48b55a0, https://github.com/actions/setup-node/releases/latest
        with:
          node-version: "24"
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # 91ab88e (https://github.com/pnpm/action-setup/releases/tag/v6.0.6)
        with:
          version: 10.15.1
      - run: pnpm install --frozen-lockfile
      - name: Run Dagger workflow parity
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        with:
          version: latest
          verb: run
          args: pnpm --filter @gh-reusable/dagger-pipelines run dagger:workflow --id test-setup-rust
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
