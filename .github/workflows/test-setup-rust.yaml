name: "Test | Setup Rust"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/setup-rust/**"
      - ".github/workflows/test-setup-rust.yaml"
  push:
    branches:
      - main
    paths:
      - "actions/setup-rust/**"
      - ".github/workflows/test-setup-rust.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  test-setup-rust:
    name: "Setup Rust (Dagger)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Test setup-rust (1.95 toolchain with clippy + rustfmt)
        uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            setup-rust
            --source=.
            --toolchain=1.95
            --components=clippy,rustfmt
            with-exec --args=rustc,--version
            stdout
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref: ${{ github.ref_name }}
