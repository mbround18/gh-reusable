name: "Rust Build and Test"

on:
  workflow_call:
    inputs:
      toolchain:
        required: false
        type: string
        description: "Rust toolchain to use (e.g., stable, nightly, beta)."
        default: "stable"
      components:
        required: false
        type: string
        description:
          "Comma-separated list of Rust components to install (e.g., rustfmt,
          clippy)."
        default: "clippy rustfmt"
      target:
        required: false
        type: string
        description: "Comma-separated list of additional Rust compilation targets."
        default: ""
      runs-on:
        required: false
        type: string
        description: "GitHub runner to use for this workflow."
        default: "ubuntu-latest"

env:
  NAME: "Rust Test"
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Run Rust workflow in Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            rust-build-and-test
            --source=.
            --toolchain=${{ inputs.toolchain }}
            --components=${{ inputs.components }}
            --target=${{ inputs.target }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
