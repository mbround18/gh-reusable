name: "Test | Release pnpm"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release-pnpm.yaml"
      - ".github/workflows/publish.yaml"
      - "packages/dagger-module/src/index.ts"
      - "packages/dagger-module/src/types.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-pnpm.yaml"
      - ".github/workflows/publish.yaml"
      - "packages/dagger-module/src/index.ts"
      - "packages/dagger-module/src/types.ts"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build/package pnpm release without publishing
    uses: ./.github/workflows/release-pnpm.yaml
    with:
      source: .
      publish: false
    secrets:
      DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
