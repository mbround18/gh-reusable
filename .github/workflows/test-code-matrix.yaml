name: "Test | Code Matrix"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/code-matrix/**"
      - "packages/dagger-module/src/index.ts"
      - ".github/workflows/test-code-matrix.yaml"
  push:
    branches:
      - main
    paths:
      - "actions/code-matrix/**"
      - "packages/dagger-module/src/index.ts"
      - ".github/workflows/test-code-matrix.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composite_action:
    name: "Composite action scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Run code-matrix action
        id: matrix
        uses: ./actions/code-matrix
        with:
          path: "."

      - name: Assert expected outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "languages:        ${{ steps.matrix.outputs.languages }}"
          echo "package-managers: ${{ steps.matrix.outputs.package-managers }}"
          echo "node-pm:          ${{ steps.matrix.outputs.node-package-manager }}"
          echo "publish-targets:  ${{ steps.matrix.outputs.publish-targets }}"
          echo "is-monorepo:      ${{ steps.matrix.outputs.is-monorepo }}"
          echo "has-docker:       ${{ steps.matrix.outputs.has-docker }}"

          # This repo uses pnpm — validate the detection
          if [ "${{ steps.matrix.outputs.node-package-manager }}" != "pnpm" ]; then
            echo "ERROR: expected node-package-manager=pnpm, got ${{ steps.matrix.outputs.node-package-manager }}"
            exit 1
          fi
          if [ "${{ steps.matrix.outputs.is-monorepo }}" != "true" ]; then
            echo "ERROR: expected is-monorepo=true"
            exit 1
          fi

  dagger_function:
    name: "Dagger codeMatrix function"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

      - name: Test codeMatrix Dagger function
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: code-matrix --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
