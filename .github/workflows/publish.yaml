name: Publish

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Publish target: node | rust-crate | helm-chart"
      source:
        required: false
        type: string
        default: "."
        description: "Path to the source directory."
      registry:
        required: false
        type: string
        default: ""
        description: "Registry URL. Defaults: node → https://registry.npmjs.org, rust-crate → crates.io, helm-chart → oci://registry-1.docker.io/helm-charts"
      chart:
        required: false
        type: string
        default: "."
        description: "Path to the Helm chart directory (helm-chart target only)."
      tag:
        required: false
        type: string
        default: ""
        description: "npm dist-tag (node target only, e.g. latest, next, beta)."
      version:
        required: false
        type: string
        default: ""
        description: "Version override (must match version in manifest)."
      workspace:
        required: false
        type: boolean
        default: false
        description: "Publish all members of a Cargo workspace (rust-crate target only)."
      crate:
        required: false
        type: string
        default: ""
        description: "Specific crate name to publish within the workspace (rust-crate target only). Leave empty to publish the root crate or, when workspace=true, all members."
      publish:
        required: false
        type: boolean
        default: true
        description: "Whether to publish after packaging. Set false for build/package-only tests."
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "GitHub runner label."
    secrets:
      NPM_TOKEN:
        required: false
        description: "Token with publish access to the npm registry (node target)."
      CARGO_REGISTRY_TOKEN:
        required: false
        description: "Token with publish access to the Cargo registry (rust-crate target)."
      HELM_USERNAME:
        required: false
        description: "Username for the Helm OCI registry (helm-chart target)."
      HELM_PASSWORD:
        required: false
        description: "Password for the Helm OCI registry (helm-chart target)."
      DAGGER_CLOUD_TOKEN:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false
        description: "Discord webhook URL for publish notifications."

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  publish-node:
    name: Publish Node package
    if: inputs.target == 'node'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest
      - id: publish
        uses: ./.github/actions/dagger-run
        with:
          call: >-
            publish-npm
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
            --publish=${{ inputs.publish }}
            --discord-webhook=${{ secrets.DISCORD_WEBHOOK_URL }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0, https://github.com/actions/github-script/releases/tag/v9.0.0
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            const hasErrors = (payload.errors || report.errors || []).length > 0
            const failed = payload.success === false || report.success === false || hasErrors
            if (failed) core.setFailed('Pipeline report indicates failure')
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: publish-report
          path: |
            report.json
            report.md

  publish-rust:
    name: Publish Rust crate
    if: inputs.target == 'rust-crate'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest
      - id: publish
        uses: ./.github/actions/dagger-run
        with:
          call: >-
            publish-rust-crate
            --source=${{ inputs.source || '.' }}
            --token=${{ secrets.CARGO_REGISTRY_TOKEN }}
            --registry=${{ inputs.registry || 'crates.io' }}
            --version=${{ inputs.version || github.ref_name }}
            --workspace=${{ inputs.workspace }}
            --crate=${{ inputs.crate }}
            --discord-webhook=${{ secrets.DISCORD_WEBHOOK_URL }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0, https://github.com/actions/github-script/releases/tag/v9.0.0
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            const hasErrors = (payload.errors || report.errors || []).length > 0
            const failed = payload.success === false || report.success === false || hasErrors
            if (failed) core.setFailed('Pipeline report indicates failure')
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: publish-report
          path: |
            report.json
            report.md

  publish-helm:
    name: Publish Helm chart
    if: inputs.target == 'helm-chart'
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest
      - id: publish
        uses: ./.github/actions/dagger-run
        with:
          call: >-
            publish-helm-chart
            --source=${{ inputs.source || '.' }}
            --chart=${{ inputs.chart || '.' }}
            --registry=${{ inputs.registry || 'oci://registry-1.docker.io/helm-charts' }}
            --username=${{ secrets.HELM_USERNAME }}
            --password=${{ secrets.HELM_PASSWORD }}
            --version=${{ inputs.version }}
            --discord-webhook=${{ secrets.DISCORD_WEBHOOK_URL }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0, https://github.com/actions/github-script/releases/tag/v9.0.0
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            const hasErrors = (payload.errors || report.errors || []).length > 0
            const failed = payload.success === false || report.success === false || hasErrors
            if (failed) core.setFailed('Pipeline report indicates failure')
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: publish-report
          path: |
            report.json
            report.md
