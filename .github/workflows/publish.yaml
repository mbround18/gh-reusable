name: Publish Workflows

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        type: choice
        default: all
        options:
          - all
          - npm
          - pnpm
          - yarn
          - rust
          - helm
      source:
        description: Source directory
        required: false
        type: string
        default: "."
      chart:
        description: Helm chart directory
        required: false
        type: string
        default: "."
      registry:
        description: Registry or OCI registry
        required: false
        type: string
        default: "https://registry.npmjs.org"
      helm_registry:
        description: Helm OCI registry
        required: false
        type: string
        default: "oci://registry-1.docker.io/helm-charts"
      tag:
        description: Optional npm dist-tag or release tag
        required: false
        type: string
        default: ""
      version:
        description: Version override
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      target:
        required: false
        type: string
        default: all
      source:
        required: false
        type: string
        default: "."
      chart:
        required: false
        type: string
        default: "."
      registry:
        required: false
        type: string
        default: "https://registry.npmjs.org"
      helm_registry:
        required: false
        type: string
        default: "oci://registry-1.docker.io/helm-charts"
      tag:
        required: false
        type: string
        default: ""
      version:
        required: false
        type: string
        default: ""
    secrets:
      DAGGER_CLOUD_TOKEN:
        required: false
      NPM_TOKEN:
        required: false
      CARGO_REGISTRY_TOKEN:
        required: false
      HELM_USERNAME:
        required: false
      HELM_PASSWORD:
        required: false
      S3_ACCESS_KEY:
        required: false
      S3_SECRET_KEY:
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_npm:
    if: >-
      ${{ (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'npm')
      && (hashFiles(format('{0}/package-lock.json', inputs.source || '.')) != ''
      || (hashFiles(format('{0}/pnpm-lock.yaml', inputs.source || '.')) == ''
      && hashFiles(format('{0}/yarn.lock', inputs.source || '.')) == '')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish npm package in Dagger
        id: publish_npm
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          DAGGER_VERSION: v0.20.8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: >-
            publish-npm
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize npm report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish_npm.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) {
              core.setFailed('Pipeline report contains errors')
            }
      - name: Upload npm report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-publish-report
          path: |
            report.json
            report.md

  publish_pnpm:
    if: >-
      ${{ (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'pnpm')
      && hashFiles(format('{0}/pnpm-lock.yaml', inputs.source || '.')) != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish pnpm package in Dagger
        id: publish_pnpm
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          DAGGER_VERSION: v0.20.8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: >-
            publish-pnpm
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize pnpm report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish_pnpm.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) {
              core.setFailed('Pipeline report contains errors')
            }
      - name: Upload pnpm report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-publish-report
          path: |
            report.json
            report.md

  publish_yarn:
    if: >-
      ${{ (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'yarn')
      && hashFiles(format('{0}/yarn.lock', inputs.source || '.')) != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish yarn package in Dagger
        id: publish_yarn
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          DAGGER_VERSION: v0.20.8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: >-
            publish-yarn
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize yarn report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish_yarn.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) {
              core.setFailed('Pipeline report contains errors')
            }
      - name: Upload yarn report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: yarn-publish-report
          path: |
            report.json
            report.md

  publish_rust:
    if: >-
      ${{ (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'rust')
      && hashFiles(format('{0}/Cargo.toml', inputs.source || '.')) != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish Rust crate in Dagger
        id: publish_rust
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          DAGGER_VERSION: v0.20.8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: >-
            publish-rust-crate
            --source=${{ inputs.source || '.' }}
            --token=${{ secrets.CARGO_REGISTRY_TOKEN }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize rust report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish_rust.outputs.stdout }}
        with:
