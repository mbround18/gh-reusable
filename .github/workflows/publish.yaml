          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish Helm chart in Dagger
        id: publish_helm
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          DAGGER_VERSION: v0.20.8
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: >-
            publish-helm-chart
            --source=${{ inputs.source || '.' }}
            --chart=${{ inputs.chart || '.' }}
            --registry=${{ inputs.helm_registry || 'oci://registry-1.docker.io/helm-charts' }}
            --username=${{ secrets.HELM_USERNAME }}
            --password=${{ secrets.HELM_PASSWORD }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize helm report
