  publish_helm:
    if: >-
      ${{ (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'helm')
      && hashFiles(format('{0}/Chart.yaml', inputs.chart || '.')) != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
