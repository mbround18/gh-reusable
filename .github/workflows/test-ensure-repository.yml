name: "Test | Ensure Repository"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        description: "GitHub runner to use for this workflow."
        default: "ubuntu-latest"
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "actions/ensure-repository/**"
      - ".github/workflows/test-ensure-repository.yml"
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "actions/ensure-repository/**"
      - ".github/workflows/test-ensure-repository.yml"

jobs:
  test_ensure_repository:
    name: Test Ensure Repository (Dagger)
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Run Dagger workflow parity
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: ci --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
