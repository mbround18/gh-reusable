name: Docker Release Workflow
on:
  workflow_call:
    inputs:
      image:
        type: string
        required: true
        default: "mbround18/test"
        description: "Name of the image to be built"
      context:
        type: string
        required: false
        default: "."
        description: "Build context directory"
      canary_label:
        type: string
        required: false
        default: "canary"
        description: "Label to trigger canary pushes"
      dockerfile:
        type: string
        default: "./Dockerfile"
        description: "Path to the Dockerfile relative to the context"
      ghcr:
        type: boolean
        default: false
        description: Release to GHCR?
      ghcr_username:
        type: string
        default: "mbround18"
        description: Who to log into ghcr as.zs
      dockerhub_username:
        type: string
        default: "mbround18"
        description: Who to log into dockerhub as.
      semver_prefix:
        type: string
        default: ""
        description:
          "Prefixer for semver, use this if you publish multiple artifacts
          like example-0.0.0"
      prepend_target:
        type: boolean
        default: false
        description:
          "Prepend the target to the version tag (e.g., target-v0.0.0 instead
          of v0.0.0)"
      target:
        type: string
        default: ""
        description: "Target to build"
        required: false
      platforms:
        type: string
        default: "linux/amd64"
        required: false
        description: "Comma separated list of target platforms (e.g.,
          linux/amd64,linux/arm64)"
      download_artifact:
        type: string
        default: ""
        description: "Download a specific artifact to use within docker build"
        required: false
      download_artifact_destination:
        type: string
        default: ""
        description: "When downloading an artifact this helps it extract to a specific dir"
        required: false
      track_release_summary:
        type: boolean
        default: false
        description: "When true on tag refs, create or update GitHub release notes with Docker publish details."
    secrets:
      DOCKER_TOKEN:
        required: true
      GHCR_TOKEN:
        required: false
      DAGGER_CLOUD_TOKEN:
        required: false

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.image }}
  cancel-in-progress: true

run-name: Docker Release for ${{ inputs.image }}

jobs:
  release:
    name: >-
      Docker Release for ${{ inputs.image }} @ ${{ github.event_name ==
      'pull_request' && format('PR #{0}', github.event.pull_request.number) ||
      github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
        with:
          fetch-depth: 0
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

      - if: ${{ inputs.download_artifact != '' }}
        uses: actions/download-artifact@ad191675b41f6a5b46da9a048cb6893812da158b # ad19167, https://github.com/actions/download-artifact/releases/latest
        with:
          name: ${{ inputs.download_artifact }}
          path: ${{ inputs.download_artifact_destination }}

      - name: Resolve Docker release metadata
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          image_input="${{ inputs.image }}"
          if [[ "$image_input" == *.*/* ]] || [[ "$image_input" == localhost/* ]]; then
            publish_image="$image_input"
          else
            publish_image="docker.io/$image_input"
          fi

          registries="docker.io"
          if [[ "${{ inputs.ghcr }}" == "true" ]]; then
            registries="${registries},ghcr.io"
          fi

          increment="patch"
          branch_name="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            branch_name="${GITHUB_HEAD_REF:-$branch_name}"
            labels="$(jq -r '.pull_request.labels[].name? // empty' "$GITHUB_EVENT_PATH" || true)"
            if echo "$labels" | grep -Eiq '(^|[-_ /])(major|breaking|breaking-change)($|[-_ /])'; then
              increment="major"
            elif echo "$labels" | grep -Eiq '(^|[-_ /])(minor|feature|feat)($|[-_ /])'; then
              increment="minor"
            elif echo "$labels" | grep -Eiq '(^|[-_ /])(patch|fix|hotfix)($|[-_ /])'; then
              increment="patch"
            fi
          fi

          if [[ "$increment" == "patch" ]]; then
            if [[ "$branch_name" =~ (^|/)(major|breaking|breaking-change)($|/) ]]; then
              increment="major"
            elif [[ "$branch_name" =~ (^|/)(minor|feature|feat|release)($|/) ]]; then
              increment="minor"
            elif [[ "$branch_name" =~ (^|/)(patch|fix|hotfix|bugfix)($|/) ]]; then
              increment="patch"
            fi
          fi

          tags_csv="$(git tag --list | paste -sd ',' - || true)"

          {
            echo "publish_image=$publish_image"
            echo "registries=$registries"
            echo "increment=$increment"
            echo "tags=$tags_csv"
          } >> "$GITHUB_OUTPUT"

      - name: Run Docker release in Dagger
        id: dagger_release
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            docker-release
            --source=.
            --image=${{ steps.resolve.outputs.publish_image }}
            --context=${{ inputs.context }}
            --dockerfile=${{ inputs.dockerfile }}
            --target=${{ inputs.target }}
            --platforms=${{ inputs.platforms }}
            --tags-csv=${{ steps.resolve.outputs.tags }}
            --registries-csv=${{ steps.resolve.outputs.registries }}
            --semver-prefix=${{ inputs.semver_prefix }}
            --semver-increment=${{ steps.resolve.outputs.increment }}
            --prepend-target=${{ inputs.prepend_target }}
            --canary-label=${{ inputs.canary_label }}
            --dockerhub-username=${{ inputs.dockerhub_username }}
            --ghcr-username=${{ inputs.ghcr_username }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Build release summary
        id: release_summary
        if: ${{ always() && (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')) }}
        shell: bash
        env:
          DAGGER_STDOUT: ${{ steps.dagger_release.outputs.stdout }}
          DAGGER_OUTCOME: ${{ steps.dagger_release.outcome }}
          RESOLVED_IMAGE: ${{ steps.resolve.outputs.publish_image }}
        run: |
          set -euo pipefail
          tmpout="$(mktemp)"
          printf '%s\n' "${DAGGER_STDOUT:-}" > "$tmpout"

          read_line() {
            key="$1"
            awk -F= -v key="$key" '$1 == key {print substr($0, length(key) + 2)}' "$tmpout" | tail -1
          }

          decision="$(read_line decision)"
          if [[ -z "$decision" ]]; then
            if [[ "${DAGGER_OUTCOME}" == "success" ]]; then
              decision="publish"
            else
              decision="failed"
            fi
          fi

          release_tag="$(read_line releaseTag)"
          version_tag="$(read_line versionTag)"
          registries="$(read_line registries)"
          platforms="$(read_line platforms)"
          reason="$(read_line reason)"

          planned_addresses="$(awk '/^plannedAddresses:/{flag=1;next}/^publishedRefs:/{flag=0}flag' "$tmpout" || true)"
          published_refs="$(awk '/^publishedRefs:/{flag=1;next}flag' "$tmpout" || true)"
          if [[ -z "$planned_addresses" ]]; then
            planned_addresses="- (none)"
          fi
          if [[ -z "$published_refs" ]]; then
            published_refs="- (none)"
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          markdown_file="$(mktemp)"
          {
            echo "### Docker release status"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Decision | \`$decision\` |"
            echo "| Dagger step outcome | \`${DAGGER_OUTCOME}\` |"
            echo "| Image | \`${RESOLVED_IMAGE}\` |"
            echo "| Version tag | \`${version_tag:-n/a}\` |"
            echo "| Release tag | \`${release_tag:-n/a}\` |"
            echo "| Registries | \`${registries:-n/a}\` |"
            echo "| Platforms | \`${platforms:-n/a}\` |"
            echo "| Workflow run | [#${GITHUB_RUN_NUMBER}](${run_url}) |"
            if [[ -n "$reason" ]]; then
              echo "| Reason | \`$reason\` |"
            fi
            echo ""
            echo "**Planned addresses**"
            echo "$planned_addresses"
            echo ""
            echo "**Published refs**"
            echo "$published_refs"
          } > "$markdown_file"

          cat "$markdown_file" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "markdown<<EOF"
            cat "$markdown_file"
            echo "EOF"
            echo "decision=$decision"
            echo "release_tag=$release_tag"
            echo "version_tag=$version_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Update sticky PR status comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          SUMMARY_MARKDOWN: ${{ steps.release_summary.outputs.markdown }}
        with:
          script: |
            const marker = '<!-- gh-reusable:docker-release:status -->'
            const body = `${marker}\n## Docker release status\n\n${process.env.SUMMARY_MARKDOWN || '_No summary produced._'}`
            const issue_number = context.payload.pull_request.number
            const { owner, repo } = context.repo
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

      - name: Add PR run history comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          DECISION: ${{ steps.release_summary.outputs.decision }}
        with:
          script: |
            const issue_number = context.payload.pull_request.number
            const { owner, repo } = context.repo
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
            const body = [
              '<!-- gh-reusable:docker-release:history -->',
              `Docker release run [#${context.runNumber}](${runUrl}) finished with decision \`${process.env.DECISION || 'unknown'}\`.`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })

      - name: Update tag release notes
        if: ${{ always() && startsWith(github.ref, 'refs/tags/') && inputs.track_release_summary }}
        uses: actions/github-script@v7
        env:
          SUMMARY_MARKDOWN: ${{ steps.release_summary.outputs.markdown }}
        with:
          script: |
            const { owner, repo } = context.repo
            const tag = context.ref.replace('refs/tags/', '')
            const markerStart = '<!-- gh-reusable:docker-release:summary:start -->'
            const markerEnd = '<!-- gh-reusable:docker-release:summary:end -->'
            const summaryBlock = `${markerStart}\n## Docker publish summary\n\n${process.env.SUMMARY_MARKDOWN || '_No summary produced._'}\n${markerEnd}`

            let release
            try {
              const fetched = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              release = fetched.data
            } catch (error) {
              if (error.status !== 404) throw error
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body: summaryBlock,
              })
              release = created.data
            }

            const existingBody = release.body || ''
            const sectionPattern = new RegExp(`${markerStart}[\\s\\S]*${markerEnd}`)
            const newBody = sectionPattern.test(existingBody)
              ? existingBody.replace(sectionPattern, summaryBlock)
              : `${existingBody}\n\n${summaryBlock}`.trim()

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: newBody,
            })
