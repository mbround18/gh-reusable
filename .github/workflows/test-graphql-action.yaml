name: "Test | GraphQL Query Default Branch"

on:
  push:
    branches:
      - main
    paths:
      - "actions/graphql/**"
      - ".github/workflows/test-graphql-action.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "actions/graphql/**"
      - ".github/workflows/test-graphql-action.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  query_default_branch:
    name: "Query Default Branch (Dagger)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Test graphql-query (GitHub viewer login)
        uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            graphql-query
            --query=query{viewer{login}}
            --token=${{ secrets.GITHUB_TOKEN }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref: ${{ github.ref_name }}
