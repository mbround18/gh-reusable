name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest
      - uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: ci --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  build-and-push:
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Collect tags
        id: tags
        run: |
          tags="$(git tag --list | paste -sd ',' - || true)"
          echo "csv=$tags" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            docker-release
            --source=.
            --image=mbround18/gh-reusable
            --context=.
            --dockerfile=./Dockerfile
            --platforms=linux/amd64
            --tags-csv=${{ steps.tags.outputs.csv }}
            --registries-csv=docker.io
            --semver-increment=patch
            --dockerhub-username=mbround18
            --docker-token=${{ secrets.DOCKER_TOKEN }}
            --event-name=${{ github.event_name }}
            --ref=${{ github.ref }}
            --ref-name=${{ github.ref_name }}
            --head-ref=${{ github.head_ref }}
            --default-branch=${{ github.event.repository.default_branch }}
            --sha=${{ github.sha }}
            --run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            --run-number=${{ github.run_number }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
