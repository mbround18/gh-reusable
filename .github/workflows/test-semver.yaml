name: "Test | Semver Action"

on:
  pull_request:
    branches: [main]
    paths:
      - "actions/semver/**"
      - ".github/workflows/test-semver.yaml"
  push:
    tags: ["*"]
    branches: [main]
    paths:
      - "actions/semver/**"
      - ".github/workflows/test-semver.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  compute_semver:
    name: Compute next semver (Dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest
        with:
          fetch-depth: 0

      - name: Collect existing tags
        id: tags
        run: |
          tags="$(git tag --list | paste -sd ',' - || true)"
          echo "csv=$tags" >> "$GITHUB_OUTPUT"

      - name: Test compute-semver (patch from tags)
        uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            compute-semver
            --tags-csv=${{ steps.tags.outputs.csv }}
            --increment=patch
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Test compute-semver (branch-name inference)
        uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            compute-semver
            --tags-csv=${{ steps.tags.outputs.csv }}
            --branch-name=feat/new-thing
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref: ${{ github.ref_name }}
