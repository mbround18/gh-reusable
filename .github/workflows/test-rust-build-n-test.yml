name: "Test | Rust Build and Test Workflow"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/setup-rust/**"
      - ".github/workflows/rust-build-n-test.yml"
      - ".github/workflows/test-rust-build-n-test.yml"
      - "**/*.rs"
      - "**/*.toml"
      - "**/Cargo.lock"
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "actions/setup-rust/**"
      - ".github/workflows/rust-build-n-test.yml"
      - ".github/workflows/test-rust-build-n-test.yml"
      - "**/*.rs"
      - "**/*.toml"
      - "**/Cargo.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call_build_and_test_workflow:
    name: Rust Build and Test Workflow (Dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Run Dagger workflow parity
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        with:
          version: v0.20.8
          module: ./packages/dagger-module
          call: rust-build-and-test --source=. --toolchain=stable --components=clippy,rustfmt
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
