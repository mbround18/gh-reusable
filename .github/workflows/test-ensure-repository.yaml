name: "Test | Ensure Repository"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        description: "GitHub runner to use for this workflow."
        default: "ubuntu-latest"
    secrets:
      DAGGER_CLOUD_TOKEN:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "actions/ensure-repository/**"
      - ".github/workflows/test-ensure-repository.yaml"
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "actions/ensure-repository/**"
      - ".github/workflows/test-ensure-repository.yaml"

jobs:
  test_ensure_repository:
    name: Test Ensure Repository (Dagger)
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Test ensure-repository (matching repo)
        uses: mbround18/gh-reusable/.github/actions/dagger-run@main
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          module: ./packages/dagger-module
          call: >-
            ensure-repository
            --expected-repository=${{ github.repository }}
            --repository=${{ github.repository }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref: ${{ github.ref_name }}
