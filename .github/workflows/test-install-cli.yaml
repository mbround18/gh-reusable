name: "Test | Install CLI Action"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/install-cli/**"
      - ".github/workflows/test-install-cli.yaml"
  push:
    branches:
      - main
    paths:
      - "actions/install-cli/**"
      - ".github/workflows/test-install-cli.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test CLI Install (Dagger)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Test install-cli (trunk binary)
        uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            install-cli
            --repository=trunk-rs/trunk
            --asset=trunk-x86_64-unknown-linux-gnu.tar.gz
            --override-name=trunk
            --token=${{ secrets.GITHUB_TOKEN }}
            entries
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref: ${{ github.ref_name }}
