name: Reusable Tag Creation Workflow

on:
  workflow_call:
    inputs:
      prefix:
        required: false
        type: string
        default: ""
        description: "Optional app name prefix for semantic versioning"
      force:
        required: false
        type: boolean
        default: false
        description: "Force tag creation even if it already exists"
    secrets:
      GH_TOKEN:
        required: true
        description: "GitHub token with permissions to push tags"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  tagger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
        with:
          token: "${{ secrets.GH_TOKEN }}"
          fetch-depth: 0

      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

      - name: Collect existing tags
        id: tags
        run: |
          tags="$(git tag --list | paste -sd ',' - || true)"
          echo "csv=$tags" >> "$GITHUB_OUTPUT"

      - name: Resolve next version via Dagger
        id: semver
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            compute-semver
            --tags-csv=${{ steps.tags.outputs.csv }}
            --prefix=${{ inputs.prefix }}
            --branch-name=${{ github.head_ref || github.ref_name }}
            --pr-labels-csv=${{ join(github.event.pull_request.labels.*.name, ',') }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Create tag
        id: create-tag
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "actions@no-reply.github.com"

          TAG_NAME="${{ steps.semver.outputs.stdout }}"

          # Check if tag already exists
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            if [[ "${{ inputs.force }}" == "true" ]]; then
              echo "Tag $TAG_NAME already exists, but force flag is set. Deleting existing tag."
              git tag -d "$TAG_NAME" 
              git push origin :refs/tags/"$TAG_NAME" 
            else
              echo "Tag $TAG_NAME already exists. Skipping tag creation."
              exit 0
            fi
          fi

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" 
          git push origin "$TAG_NAME" 

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create-release
        run: |
          gh release create "${{ steps.create-tag.outputs.tag_name }}" \
            --title "Release ${{ steps.create-tag.outputs.tag_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
