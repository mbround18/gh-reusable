name: Node Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      package-manager:
        description: "Package manager to use (auto-detects from lockfile if not set)"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - npm
          - pnpm
          - yarn
      source:
        description: "Path to the package source directory"
        required: false
        type: string
        default: "."
      registry:
        description: "npm registry URL"
        required: false
        type: string
        default: "https://registry.npmjs.org"
      tag:
        description: "npm dist-tag (e.g. latest, next, beta)"
        required: false
        type: string
        default: ""
      version:
        description: "Version override (must match version in package.json)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      package-manager:
        required: false
        type: string
        default: "auto"
        description: "Package manager (auto, npm, pnpm, yarn)."
      source:
        required: false
        type: string
        default: "."
        description: "Path to the package source directory."
      registry:
        required: false
        type: string
        default: "https://registry.npmjs.org"
        description: "npm registry URL."
      tag:
        required: false
        type: string
        default: ""
        description: "npm dist-tag."
      version:
        required: false
        type: string
        default: ""
        description: "Version override (must match version in package.json)."
      runs-on:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "GitHub runner label."
    secrets:
      NPM_TOKEN:
        required: true
        description: "Token with publish access to the target npm registry."
      DAGGER_CLOUD_TOKEN:
        required: false
      S3_ACCESS_KEY:
        required: false
      S3_SECRET_KEY:
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect package manager
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    outputs:
      pm: ${{ steps.detect.outputs.pm }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Resolve package manager
        id: detect
        shell: bash
        run: |
          src="${{ inputs.source || '.' }}"
          override="${{ inputs.package-manager || 'auto' }}"
          if [ "$override" != "auto" ] && [ -n "$override" ]; then
            echo "pm=$override" >> "$GITHUB_OUTPUT"
          elif [ -f "$src/pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "$src/yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          fi

  publish_npm:
    name: Publish via npm
    needs: detect
    if: needs.detect.outputs.pm == 'npm'
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish npm package
        id: publish
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          GITHUB_SHA: ${{ github.sha }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            publish-npm
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) core.setFailed('Pipeline report contains errors')
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()
      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-release-report
          path: |
            report.json
            report.md

  publish_pnpm:
    name: Publish via pnpm
    needs: detect
    if: needs.detect.outputs.pm == 'pnpm'
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish pnpm package
        id: publish
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          GITHUB_SHA: ${{ github.sha }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            publish-pnpm
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) core.setFailed('Pipeline report contains errors')
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()
      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-release-report
          path: |
            report.json
            report.md

  publish_yarn:
    name: Publish via yarn
    needs: detect
    if: needs.detect.outputs.pm == 'yarn'
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Warm Dagger engine image
        run: |
          engine_image="registry.dagger.io/engine:v0.20.8"
          docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"
      - name: Publish yarn package
        id: publish
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        env:
          DAGGER_NO_NAG: "1"
          GITHUB_SHA: ${{ github.sha }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        with:
          version: v0.20.8
          module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
          call: >-
            publish-yarn
            --source=${{ inputs.source || '.' }}
            --registry=${{ inputs.registry || 'https://registry.npmjs.org' }}
            --token=${{ secrets.NPM_TOKEN }}
            --tag=${{ inputs.tag }}
            --version=${{ inputs.version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
      - name: Materialize report
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.publish.outputs.stdout }}
        with:
          script: |
            const fs = require('node:fs')
            const report = JSON.parse(process.env.REPORT_JSON || '{}')
            const payload = report.report || report
            fs.writeFileSync('report.json', JSON.stringify(payload, null, 2))
            fs.writeFileSync('report.md', report.reportMarkdown || report.markdown || '')
            if ((payload.errors || report.errors || []).length > 0) core.setFailed('Pipeline report contains errors')
            await core.summary.addRaw(report.reportMarkdown || report.markdown || '').write()
      - name: Upload report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: yarn-release-report
          path: |
            report.json
            report.md
