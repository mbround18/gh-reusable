name: "Test | Docker Release Workflow"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/docker-facts/**"
      - ".github/workflows/test-docker-release.yaml"
      - ".github/workflows/docker-release.yaml"
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "actions/docker-facts/**"
      - ".github/workflows/test-docker-release.yaml"
      - ".github/workflows/docker-release.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Docker release parity (Dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Run Dagger workflow parity
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # 27b130b (https://github.com/dagger/dagger-for-github/releases/tag/v8.4.1)
        with:
          version: latest
          module: ./dagger-module
          call: ci --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
