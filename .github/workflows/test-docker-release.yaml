name: "Test | Docker Release Workflow"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/docker-facts/**"
      - ".github/workflows/test-docker-release.yaml"
      - ".github/workflows/docker-release.yaml"
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "actions/docker-facts/**"
      - ".github/workflows/test-docker-release.yaml"
      - ".github/workflows/docker-release.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}-${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Docker release parity (Dagger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Test docker-facts (resolve tags + push decision)
        uses: ./.github/actions/dagger-run
        with:
          module: ./packages/dagger-module
          call: >-
            docker-facts
            --source=.
            --image=mbround18/gh-reusable
            --version=0.0.1
            --registries=docker.io
            --event-name=${{ github.event_name }}
            --ref=${{ github.ref }}
            --default-branch=${{ github.event.repository.default_branch || 'main' }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - if: always()
        uses: ./.github/actions/discord-notify
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ref: ${{ github.ref_name }}
