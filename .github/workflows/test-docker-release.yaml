name: "Test | Docker Release Workflow"

on:
  pull_request:
    branches:
      - main
    paths:
      - "actions/docker-facts/**"
      - ".github/workflows/test-docker-release.yaml"
      - ".github/workflows/docker-release.yaml"
  push:
    tags:
      - "*"
    branches:
      - main
    paths:
      - "actions/docker-facts/**"
      - ".github/workflows/test-docker-release.yaml"
      - ".github/workflows/docker-release.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure_repository:
    name: Ensure Repository
    runs-on: ubuntu-latest
    steps:
      - name: Verify Repo is mbround18/gh-reusable
        uses: mbround18/gh-reusable/actions/ensure-repository@main

  run_tests:
    name: Run tests for Docker Facts
    runs-on: ubuntu-latest
    needs: ensure_repository
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 48b55a0, https://github.com/actions/setup-node/releases/latest
        with:
          node-version: "24"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate Docker Facts action
        run: |
          pnpm --filter @gh-reusable/docker-facts-action run typecheck
          pnpm --filter @gh-reusable/docker-facts-action run build
          pnpm --filter @gh-reusable/docker-facts-action run test

  call_docker_release:
    needs: run_tests
    name: Call Docker Release Workflow
    uses: mbround18/gh-reusable/.github/workflows/docker-release.yaml@main
    with:
      image: "mbround18/gh-reusable-testing" # Specify the test image name here
      ghcr: true
      context: "tests/docker"
    secrets: inherit

  call_docker_release_compose:
    needs: call_docker_release
    strategy:
      matrix:
        target: ["compose", "compose2"]
        prepend_target: [false, true]
    name: Call Docker Release Workflow (Compose)
    uses: mbround18/gh-reusable/.github/workflows/docker-release.yaml@main
    with:
      image: "mbround18/gh-reusable-testing-${{matrix.target}}" # Specify the test image name here
      ghcr: true
      prepend_target: ${{ matrix.prepend_target }}
      context: "tests/docker-compose"
    secrets: inherit
