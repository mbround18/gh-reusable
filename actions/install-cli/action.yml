name: "Install CLI from GitHub"
description: "Downloads and installs a CLI binary from a GitHub release, with caching."
author: "mbround18"

inputs:
  repository:
    description: "GitHub repository in owner/repo format (e.g. trunk-rs/trunk)."
    required: true
  version:
    description: "Release version to install. Defaults to latest."
    required: false
    default: "latest"
  asset:
    description: "Asset filename pattern. Use %VERSION% as a placeholder (e.g. trunk-%VERSION%-x86_64-unknown-linux-gnu.tar.gz)."
    required: true
  override-name:
    description: "Rename the installed binary to this name."
    required: false
    default: ""
  github-token:
    description: "GitHub token for API requests."
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: "Resolved version that was installed."

runs:
  using: node24
  main: index.mjs
