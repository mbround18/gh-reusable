name: "Setup Terraform"
description: "Returns a Terraform (or OpenTofu) Dagger container with source mounted."
author: "mbround18"

inputs:
  source:
    description: "Path to the source directory."
    required: false
    default: "."
  terraform-version:
    description: "Terraform version (e.g. '1.11', 'latest'). Defaults to latest."
    required: false
    default: "latest"
  use-opentofu:
    description: "Use OpenTofu instead of Terraform."
    required: false
    default: "false"
  cloud-token:
    description: "Dagger Cloud token for telemetry."
    required: false
    default: ""

outputs:
  version:
    description: "Terraform / OpenTofu version string reported by the container."
    value: ${{ steps.run.outputs.stdout }}

runs:
  using: composite
  steps:
    - name: Warm Dagger engine image
      shell: bash
      run: |
        engine_image="registry.dagger.io/engine:v0.20.8"
        docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

    - name: Setup Terraform via Dagger
      id: run
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
      env:
        DAGGER_NO_NAG: "1"
      with:
        version: v0.20.8
        module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
        call: >-
          setup-terraform
          --source=${{ inputs.source }}
          --terraform-version=${{ inputs.terraform-version }}
          --use-opentofu=${{ inputs.use-opentofu }}
          with-exec --args=terraform,version
          stdout
        cloud-token: ${{ inputs.cloud-token }}
