name: "Setup Rust"
description: "Returns a Rust Dagger container with source mounted, toolchain installed, and optional crates."
author: "mbround18"

inputs:
  source:
    description: "Path to the source directory."
    required: false
    default: "."
  toolchain:
    description: "Rust toolchain (e.g. 'stable', 'nightly', 'beta'). Defaults to stable."
    required: false
    default: "stable"
  components:
    description: "Space or comma-separated Rust components to install (e.g. 'clippy rustfmt')."
    required: false
    default: "clippy rustfmt"
  target:
    description: "Comma-separated additional compilation targets."
    required: false
    default: ""
  crates:
    description: "Comma-separated CLI crates to install (e.g. 'trunk,wasm-bindgen-cli')."
    required: false
    default: ""
  cloud-token:
    description: "Dagger Cloud token for telemetry."
    required: false
    default: ""

outputs:
  version:
    description: "rustc version string reported by the container."
    value: ${{ steps.run.outputs.stdout }}

runs:
  using: composite
  steps:
    - name: Warm Dagger engine image
      shell: bash
      run: |
        engine_image="registry.dagger.io/engine:v0.20.8"
        docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

    - name: Setup Rust via Dagger
      id: run
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
      env:
        DAGGER_NO_NAG: "1"
      with:
        version: v0.20.8
        module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
        call: >-
          setup-rust
          --source=${{ inputs.source }}
          --toolchain=${{ inputs.toolchain }}
          --components=${{ inputs.components }}
          --target=${{ inputs.target }}
          --crates=${{ inputs.crates }}
          with-exec --args=rustc,--version
          stdout
        cloud-token: ${{ inputs.cloud-token }}
