name: "Setup Go"
description: "Returns a Go Dagger container with source mounted."
author: "mbround18"

inputs:
  source:
    description: "Path to the source directory."
    required: false
    default: "."
  go-version:
    description: "Go version (e.g. '1.24'). Defaults to 1.24."
    required: false
    default: "1.24"
  cloud-token:
    description: "Dagger Cloud token for telemetry."
    required: false
    default: ""

outputs:
  version:
    description: "Go version string reported by the container."
    value: ${{ steps.run.outputs.stdout }}

runs:
  using: composite
  steps:
    - name: Warm Dagger engine image
      shell: bash
      run: |
        engine_image="registry.dagger.io/engine:v0.20.8"
        docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

    - name: Setup Go via Dagger
      id: run
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
      env:
        DAGGER_NO_NAG: "1"
      with:
        version: v0.20.8
        module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
        call: >-
          setup-go
          --source=${{ inputs.source }}
          --go-version=${{ inputs.go-version }}
          with-exec --args=go,version
          stdout
        cloud-token: ${{ inputs.cloud-token }}
