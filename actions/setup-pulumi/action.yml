name: "Setup Pulumi"
description: "Returns a Pulumi Dagger container for the given runtime with source mounted."
author: "mbround18"

inputs:
  source:
    description: "Path to the source directory."
    required: false
    default: "."
  pulumi-version:
    description: "Pulumi CLI version (e.g. '3.160.0', 'latest'). Defaults to latest."
    required: false
    default: "latest"
  runtime:
    description: "Pulumi runtime image: nodejs (default), python, go, dotnet."
    required: false
    default: "nodejs"
  cloud-token:
    description: "Dagger Cloud token for telemetry."
    required: false
    default: ""

outputs:
  version:
    description: "Pulumi CLI version string reported by the container."
    value: ${{ steps.run.outputs.stdout }}

runs:
  using: composite
  steps:
    - name: Warm Dagger engine image
      shell: bash
      run: |
        engine_image="registry.dagger.io/engine:v0.20.8"
        docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

    - name: Setup Pulumi via Dagger
      id: run
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
      env:
        DAGGER_NO_NAG: "1"
      with:
        version: v0.20.8
        module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
        call: >-
          setup-pulumi
          --source=${{ inputs.source }}
          --pulumi-version=${{ inputs.pulumi-version }}
          --runtime=${{ inputs.runtime }}
          with-exec --args=pulumi,version
          stdout
        cloud-token: ${{ inputs.cloud-token }}
