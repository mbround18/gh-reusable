name: "Setup Java"
description: "Returns a JDK Dagger container with source mounted. Supports temurin, corretto, zulu, and liberica distributions."
author: "mbround18"

inputs:
  source:
    description: "Path to the source directory."
    required: false
    default: "."
  java-version:
    description: "JDK version (e.g. '21', '17'). Defaults to 21 LTS."
    required: false
    default: "21"
  distribution:
    description: "JDK distribution: temurin (default), corretto, zulu, liberica."
    required: false
    default: "temurin"
  cloud-token:
    description: "Dagger Cloud token for telemetry."
    required: false
    default: ""

outputs:
  version:
    description: "JDK version string reported by the container."
    value: ${{ steps.run.outputs.stdout }}

runs:
  using: composite
  steps:
    - name: Warm Dagger engine image
      shell: bash
      run: |
        engine_image="registry.dagger.io/engine:v0.20.8"
        docker image inspect "$engine_image" >/dev/null 2>&1 || docker pull "$engine_image"

    - name: Setup Java via Dagger
      id: run
      uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
      env:
        DAGGER_NO_NAG: "1"
      with:
        version: v0.20.8
        module: github.com/mbround18/gh-reusable/packages/dagger-module@dagger/io
        call: >-
          setup-java
          --source=${{ inputs.source }}
          --java-version=${{ inputs.java-version }}
          --distribution=${{ inputs.distribution }}
          with-exec --args=java,--version
          stdout
        cloud-token: ${{ inputs.cloud-token }}
